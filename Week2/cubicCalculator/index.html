<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICS4U1 - Cubic Calculator Assignment</title>
</head>

<body>
    <div class="container">
        <h1>Cubic Calculator</h1>
        <form id="calculatorForm">
            <div class="card-container">
                <div class="card">
                    <div class="basic-card basic-card-aqua">
                        <div class="card-content">
                            <span class="card-title">
                                <label for="a">Enter a value:</label>
                            </span>
                            <input id="a" type="number">
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="basic-card basic-card-aqua">
                        <div class="card-content">
                            <span class="card-title">
                                <label for="b">Enter b value:</label>
                            </span>
                            <input id="b" type="number">
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="basic-card basic-card-aqua">
                        <div class="card-content">
                            <span class="card-title">
                                <label for="c">Enter c value:</label>
                            </span>
                            <input id="c" type="number">
                        </div>
                    </div>
                </div>
                <div class="basic-card basic-card-aqua">
                    <div class="card-content">
                        <span class="card-title">
                            <label for="d">Enter d value:</label>
                        </span>
                        <input id="d" type="number">
                    </div>
                </div>
                <div class="card">
                    <label for="result">Result:</label>
                    <input id="result" type="number">
                </div>
            </div>
        </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
